<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Love Animation</title>
<audio autoplay loop>
  <source src="iloveu PM.mpeg" type="audio/mpeg">
</audio>

<style>
body{
    margin:0;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
    font-family: Arial, sans-serif;
}

/* ===== القلب الكبير ===== */
.wrapper{
    position:relative;
    width:700px;
    height:600px;
    z-index:2;
}

.big-heart{
    width:100%;
    height:100%;
    color:#ff2e63;
    font-size:18px;
    font-weight:bold;
    line-height:20px;
    text-align:center;

    -webkit-clip-path: polygon(
        50% 95%,
        5% 55%,
        15% 30%,
        35% 15%,
        50% 30%,
        65% 15%,
        85% 30%,
        95% 55%
    );
    clip-path: polygon(
        50% 95%,
        5% 55%,
        15% 30%,
        35% 15%,
        50% 30%,
        65% 15%,
        85% 30%,
        95% 55%
    );

    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    align-content:center;
    overflow:hidden;
}

.big-heart span{
    margin:3px;
}

/* ===== القلوب الصغيرة ===== */
.small-hearts{
    position:absolute;
    width:100%;
    height:100%;
    top:0;
    left:0;
    z-index:1;
}

.small{
    position:absolute;
    color:#ff4d88;
    font-size:12px;
    opacity:0.7;
    animation: float 6s linear infinite;
}

/* حركة لف حوالين القلب */
@keyframes float{
    0%{ transform:rotate(0deg) translateX(350px) rotate(0deg);}
    100%{ transform:rotate(360deg) translateX(350px) rotate(-360deg);}
}
</style>
</head>
<body>

<div class="small-hearts"></div>

<div class="wrapper">
    <div class="big-heart"></div>
</div>

<script>
/* ===== تكوين القلب الكبير ===== */
const big = document.querySelector(".big-heart");

for(let i = 0; i < 500; i++){
    const span = document.createElement("span");
    span.textContent = "i love you lana";
    big.appendChild(span);
}

/* ===== القلوب الصغيرة اللي بتلف ===== */
const container = document.querySelector(".small-hearts");

for(let i = 0; i < 12; i++){
    const span = document.createElement("div");
    span.className = "small";
    span.textContent = "i love you lana ❤";
    span.style.top = "50%";
    span.style.left = "50%";
    span.style.animationDuration = (4 + Math.random()*4) + "s";
    span.style.animationDelay = (Math.random()*2) + "s";
    container.appendChild(span);
}
</script>

</body>
</html>
